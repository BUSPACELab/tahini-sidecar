#cloud-config

package_update: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - wget
  - rsync
  - git

runcmd:
  # Install Docker Engine from Docker's official apt repo (includes Compose v2)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker ${admin_username}
  # Install Bazelisk as /usr/local/bin/bazel
  - wget -qO /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
  - chmod +x /usr/local/bin/bazel
  # Install Intel SGX DCAP driver + libraries (for DC-series VMs)
  - echo 'deb [arch=amd64] https://download.01.org/intel-sgx/sgx_repo/ubuntu jammy main' > /etc/apt/sources.list.d/intel-sgx.list
  - wget -qO - https://download.01.org/intel-sgx/sgx_repo/ubuntu/intel-sgx-deb.key | apt-key add -
  - apt-get update
  - apt-get install -y libsgx-epid libsgx-quote-ex libsgx-dcap-ql libsgx-dcap-default-qpl sgx-aesm-service
  - systemctl enable --now aesmd
  # Clone the repository with submodules
  - git clone --recurse-submodules https://github.com/${github_repo}.git /home/${admin_username}/tahini-sidecar
  - chown -R ${admin_username}:${admin_username} /home/${admin_username}/tahini-sidecar
